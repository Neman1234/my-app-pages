<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Kids</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(135deg, #050816, #0b1026, #1a1446);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        /* Animated stars */
        body::before{
            content:"";
            position:absolute;
            width:200%;
            height:200%;
            background-image:
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(#7dd3fc 1px, transparent 1px),
                radial-gradient(#c084fc 1px, transparent 1px);
            background-size:120px 120px, 180px 180px, 250px 250px;
            opacity:0.4;
            animation: drift 60s linear infinite;
        }

        @keyframes drift{
            from{transform:translate(0,0);}
            to{transform:translate(-200px,-200px);}
        }

        .container{
            position:relative;
            z-index:2;
            max-width:900px;
            width:90%;
            padding:50px;
            text-align:center;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:24px;
            box-shadow:0 0 40px rgba(124,58,237,0.3);
        }

        .logo{
            font-size:4rem;
            margin-bottom:15px;
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
            background:linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .subtitle{
            font-size:1.2rem;
            color:#d1d5db;
            line-height:1.8;
            margin-bottom:40px;
        }

        .buttons{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
        }

        .btn{
            text-decoration:none;
            color:white;
            padding:15px 32px;
            border-radius:12px;
            font-weight:600;
            transition:all 0.3s ease;
        }

        .primary{
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
        }

        .secondary{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(139,92,246,0.4);
        }

        .footer{
            margin-top:40px;
            color:#9ca3af;
            font-size:0.9rem;
        }

        @media(max-width:768px){
            h1{
                font-size:2.2rem;
            }

            .logo{
                font-size:3rem;
            }

            .container{
                padding:35px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">🌌</div>

        <h1>Galaxy Kids</h1>

        <p class="subtitle">
            Welcome to Galaxy Kids — a safe, educational, and AI-powered learning experience
            designed to inspire creativity, exploration, and discovery for young learners.
        </p>

        <div class="buttons">
            <a href="privacy.html" class="btn primary">Privacy Policy</a>
            <a href="support.html" class="btn secondary">Support Center</a>
        </div>

        <div class="footer">
            © 2026 Galaxy Kids. All Rights Reserved.
        </div>

    </div>

</body>
</html>
